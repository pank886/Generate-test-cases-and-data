# ============================================================
# 数据工厂方法注册表 v2（分类结构）
# 在此注册的所有方法通过 ${} 语法在 YAML 中使用，
# 由测试框架在运行时自动解析替换（base/apiutil.py replace_load）。
#
# 新增方法：先归大类（无合适大类则新增大类），在该类 methods 下
# 追加条目，无需修改代码。目录由加载器自动渲染，无需手工维护。
#
# 条目字段：
#   name / syntax / description / params / usage_tips  → 渲染进 prompt
#   validation (可选: min_args / max_args / arg0_enum) → 占位符校验器消费，
#                                                         不渲染进 prompt
# ============================================================

categories:
  - name: 基础类
    description: 每次生成都会使用 —— 跨步骤数据传递。写入侧为用例的 extract（返回数据提取，保存至公共参数列表）/ input_extract（输入数据提取，保存至公共参数列表）字段；本类方法负责读取与拆分公共参数列表。
    methods:
      - name: get_extract_data
        syntax: "${get_extract_data('key')}"
        description: 从公共参数列表（extract.yaml）读取已保存的变量值；值为列表时返回第一个元素；可传二级 key 读取嵌套字典
        params:
          key: 公共参数列表中的一级 key（必填，字符串需加引号）
          sec_node_name: 二级 key，访问嵌套字典（可选）
          randoms: 列表取值方式，0=随机取一个, -1=逗号拼接（可选）
        usage_tips:
          - "读取上游保存的ID: ${get_extract_data('resourceId')}"
          - "跨步骤引用车牌: ${get_extract_data('carInNumber')}"
          - "读取嵌套字段: ${get_extract_data('configData', 'host')}"
        validation:
          min_args: 1
          max_args: 3

      - name: get_extract_data_list
        syntax: "${get_extract_data_list('key', randoms)}"
        description: 从公共参数列表读取列表值；randoms 缺省=取第一个, 0=随机取一个, -1=全部逗号拼接为字符串
        params:
          key: 公共参数列表中的 key（必填，字符串需加引号）
          randoms: 取值方式（可选）
        usage_tips:
          - "默认取第一个: ${get_extract_data_list('carInNumber')}"
          - "随机取一个: ${get_extract_data_list('plates', 0)}"
          - "全部拼接: ${get_extract_data_list('plates', -1)}"
        validation:
          min_args: 1
          max_args: 2

      - name: split_extract_data
        syntax: "${split_extract_data('key', index)}"
        description: 从公共参数列表读取逗号拼接的字符串，按索引拆分取其中一个（索引从 0 开始，缺省 0）
        params:
          key: 公共参数列表中的 key（必填，字符串需加引号）
          index: 拆分后的索引，0 开始（可选，默认 0）
        usage_tips:
          - "取拼接串的第2个: ${split_extract_data('plates', 1)}"
        validation:
          min_args: 1
          max_args: 2

  - name: 数据生成类
    description: 随机/构造业务测试数据
    methods:
      - name: random_plates
        syntax: '${random_plates(N)}'
        description: 生成不重复的随机中国大陆车牌，全局自动去重
        params:
          N: 车牌数量（1=单个, 3=逗号分隔3个, clear=清空已生成记录）
        usage_tips:
          - '生成单个车牌: ${random_plates(1)} → "京A12345"'
          - '生成多个车牌: ${random_plates(3)} → "京A12345,沪B67890,浙C11223"'
          - '搭配 input_extract 使用: 将生成的车牌存入公共参数列表供下游引用'
        validation:
          min_args: 1
          max_args: 1

  - name: 时间类
    description: 当前时间与偏移时间（未来/过去场景）。注意：时间偏移一律用 get_offset_time，禁止在占位符内做任何运算；注册表不支持的时间能力用合理固定字面量（如 "2029-12-31 10:00:00"）
    methods:
      - name: get_current_time
        syntax: '${get_current_time(fmt)}'
        description: 获取系统当前时间
        params:
          fmt: ydm=仅日期（YYYY-MM-DD）, hms=日期+时间（YYYY-MM-DD HH:MM:SS）
        usage_tips:
          - '仅日期: ${get_current_time(ydm)} → "2026-07-02"'
          - '日期时间: ${get_current_time(hms)} → "2026-07-02 14:30:00"'
          - '常用于 time、currentTime、payTime 等时间字段'
        validation:
          min_args: 1
          max_args: 1
          arg0_enum: [ydm, hms]

      - name: get_offset_time
        syntax: '${get_offset_time(fmt, days, hours, minutes, seconds)}'
        description: 获取偏移后的时间字符串，所有偏移参数可为负数（表示过去）；fmt 必填，偏移量可选默认 0
        params:
          fmt: ydm=仅日期, hms=日期+时间（必填）
          days: 偏移天数（可选，默认0，负数=过去）
          hours: 偏移小时（可选，默认0）
          minutes: 偏移分钟（可选，默认0）
          seconds: 偏移秒数（可选，默认0）
        usage_tips:
          - '明天日期: ${get_offset_time(ydm, 1)}'
          - '明天上午10点: ${get_offset_time(ydm, 1)} 10:00:00（日期占位符后拼固定时分秒）'
          - '昨天此刻: ${get_offset_time(hms, -1)}'
          - '2小时后: ${get_offset_time(hms, 0, 2)}'
          - '30分钟前: ${get_offset_time(hms, 0, 0, -30)}'
          - '未来365天(年卡截止): ${get_offset_time(ydm, 365)}'
        validation:
          min_args: 1
          max_args: 5
          arg0_enum: [ydm, hms]
