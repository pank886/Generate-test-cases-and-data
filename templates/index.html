<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>智能测试助手</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header>
<span class="logo">🛠️ 智能测试助手</span>
<nav>
<a href="javascript:void(0)" data-tab="upload" class="active" onclick="switchTab('upload')">📄 文档上传</a>
<a href="javascript:void(0)" data-tab="manage" onclick="switchTab('manage')">📁 文档管理</a>
<a href="javascript:void(0)" data-tab="chat" onclick="switchTab('chat')">💬 测试生成</a>
</nav>
<span id="nav-status" style="margin-left:auto;font-size:12px;font-weight:400;opacity:.8"></span>
</header>
<div class="body">

<!-- ====== Tab 1: 文档上传 ====== -->
<div class="tab active" id="tab-upload">
  <div class="card"><h3>📤 上传文档</h3>
  <div class="upload-grid">
    <label class="upload-card" ondragover="event.preventDefault();this.classList.add('dragover')" ondragleave="this.classList.remove('dragover')" ondrop="handleDrop(event,'product')">
      <div class="icon">📄</div><div class="title">产品文档</div><div class="hint">PDF / DOCX，自动提取模块和术语</div>
      <input type="file" accept=".pdf,.docx" onchange="uploadFile(this,'product')">
    </label>
    <label class="upload-card" ondragover="event.preventDefault();this.classList.add('dragover')" ondragleave="this.classList.remove('dragover')" ondrop="handleDrop(event,'api')">
      <div class="icon">📡</div><div class="title">接口文档</div><div class="hint">Markdown，LLM 拆分后确认入库</div>
      <input type="file" accept=".md,.txt" onchange="uploadFile(this,'api')">
    </label>
    <label class="upload-card" ondragover="event.preventDefault();this.classList.add('dragover')" ondragleave="this.classList.remove('dragover')" ondrop="handleDrop(event,'axure')">
      <div class="icon">🎨</div><div class="title">Axure 原型</div><div class="hint">ZIP 压缩包，提取页面结构和交互</div>
      <input type="file" accept=".zip" onchange="uploadFile(this,'axure')">
    </label>
  </div></div>
  <div class="card hidden" id="upload-progress-card"><h3>⏳ 处理中</h3><div class="progress-bar"><div class="progress-fill" id="up-progress" style="width:0%"></div></div><div id="up-progress-text" style="font-size:12px;color:var(--text-dim);margin-top:6px"></div></div>
  <div class="card" id="files-card">
    <div class="files-header">
      <h3>📋 已入库文档</h3>
      <button class="btn btn-sm btn-outline" onclick="refreshFileList()">🔄 刷新</button>
    </div>
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all" onclick="setFileFilter('all',this)">全部</button>
      <button class="filter-btn" data-filter="product" onclick="setFileFilter('product',this)">📄 产品文档</button>
      <button class="filter-btn" data-filter="api" onclick="setFileFilter('api',this)">📡 接口文档</button>
      <button class="filter-btn" data-filter="axure" onclick="setFileFilter('axure',this)">🎨 Axure 原型</button>
      <input type="text" class="filter-search" placeholder="🔍 搜索文件名..." oninput="filterFileList()" id="file-filter-input">
    </div>
    <div id="file-sections"></div>
  </div>
</div>

<!-- ====== Tab 2: 文档管理 ====== -->
<div class="tab" id="tab-manage">
<div class="three-col">
  <div class="col-left">
    <div class="card" style="height:100%"><h3>📁 模块树</h3>
      <div class="module-tree" id="module-tree"></div>
      <div class="create-row">
        <input type="text" id="new-module-input" placeholder="新建模块..." onkeydown="if(event.key==='Enter')createModule()">
        <button class="btn btn-sm" onclick="createModule()">+</button>
      </div>
    </div>
  </div>
  <div class="col-center">
    <div class="card"><h3>📋 <span id="center-title">选择一个模块</span></h3>
      <div id="bound-docs"></div>
      <div id="unassociated-docs"></div>
      <div id="related-modules-section" class="hidden">
        <h4 style="font-size:12px;color:var(--text-dim);margin:12px 0 4px">🔗 关联模块（来自文档绑定）</h4>
        <div id="related-modules-content"></div>
      </div>
      <div class="chunk-viewer hidden" id="chunk-viewer"></div>
    </div>
  </div>
  <div class="col-right">
    <div class="card" style="height:100%"><h3>📎 可关联文件（按类型）</h3>
      <div id="unassociated-by-type"></div>
      <div id="glossary-content" class="hidden">
        <div class="search-box"><input type="text" placeholder="🔍 搜索术语..." id="glossary-search"></div>
        <h4 style="font-size:12px;color:var(--text-dim);margin-bottom:8px">📝 术语表</h4>
        <div class="scroll-list" id="glossary-terms" style="max-height:300px;overflow-y:auto"></div>
        <div class="new-term-row">
          <input type="text" id="new-term-input" placeholder="术语名">
          <input type="text" id="new-term-def" placeholder="解释">
          <button class="btn btn-sm" onclick="addGlossaryTerm()">+</button>
        </div>
      </div>
    </div>
  </div>
</div></div>

<!-- ====== Tab 3: 测试生成 ====== -->
<div class="tab" id="tab-chat">
<div class="chat-layout">
  <div>
    <div class="card"><h3>💬 测试生成</h3>
      <div class="chat-box" id="chat-box"></div>
      <div class="chat-input-row">
        <input type="text" id="chat-input" placeholder="输入测试需求...">
        <button class="btn" onclick="sendWorkflowChat()">发送</button>
      </div>
    </div>
    <div class="result-panel hidden" id="result-panel"></div>
  </div>
  <div>
    <div class="card file-editor" id="file-editor">
      <h3>✏️ 编辑文件 — <span id="file-editor-path"></span></h3>
      <textarea id="file-editor-textarea" oninput="editorDirty=true"></textarea>
      <div class="actions">
        <button class="btn btn-sm" onclick="saveFileEditor()">💾 保存</button>
        <button class="btn btn-sm btn-outline" onclick="closeFileEditor()">关闭</button>
      </div>
    </div>
  </div>
</div></div>

</div><!-- body -->

<div class="modal-overlay hidden" id="modal-overlay">
  <div class="modal" id="modal-content"></div>
</div>
<div class="toast" id="toast"></div>

<script src="/static/app.js"></script>
</body>
</html>
